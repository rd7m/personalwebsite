<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#02040a" />
  <title>Remlex Admin</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="admin-page">

  <!-- Auth Screen -->
  <div class="auth-screen" id="auth-screen">
    <div class="auth-card glass-card">
      <div class="auth-header">
        <span class="auth-logo">R</span>
        <div>
          <h1>Remlex Admin</h1>
          <p>تسجيل الدخول للوصول إلى لوحة التحكم</p>
        </div>
      </div>

      <div class="field-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" />
      </div>

      <div class="field-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <p class="error-msg" id="auth-error" aria-live="polite"></p>

      <button class="btn btn-primary w-100" id="login-btn" type="button">دخول</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard" hidden>
    <header class="dash-header">
      <div class="dash-brand">
        <span class="dash-logo">Remlex</span>
        <span class="dash-label">Admin Panel</span>
      </div>
      <button class="btn btn-ghost" id="logout-btn" type="button">خروج</button>
    </header>

    <main class="dash-main">
      <!-- Profile Section -->
      <section class="card-section" aria-labelledby="profile-title">
        <h2 id="profile-title">الملف الشخصي</h2>
        <p class="section-desc">الاسم، النبذة، الصورة، وألوان الثيم.</p>

        <div class="avatar-upload">
          <img id="avatar-preview" class="avatar-preview" alt="معاينة الصورة" hidden />
          <div class="field-group">
            <label for="p-avatar-file">رفع صورة شخصية</label>
            <input type="file" id="p-avatar-file" accept="image/*" />
          </div>
        </div>

        <div class="form-grid">
          <div class="field-group">
            <label for="p-name">الاسم</label>
            <input type="text" id="p-name" placeholder="Remlex" />
          </div>

          <div class="field-group full">
            <label for="p-bio">Bio</label>
            <textarea id="p-bio" rows="2" placeholder="نبذة قصيرة..."></textarea>
          </div>

          <div class="field-group">
            <label for="p-accent">لون الهوية</label>
            <input type="color" id="p-accent" value="#3b82f6" />
          </div>

          <div class="field-group">
            <label for="p-bg-top">لون الخلفية العلوي</label>
            <input type="color" id="p-bg-top" value="#081120" />
          </div>

          <div class="field-group">
            <label for="p-bg-bottom">لون الخلفية السفلي</label>
            <input type="color" id="p-bg-bottom" value="#02040a" />
          </div>

          <div class="field-group full">
            <label for="p-avatar">رابط صورة خارجي (اختياري)</label>
            <input type="url" id="p-avatar" placeholder="https://..." />
          </div>
        </div>

        <button class="btn btn-primary" id="save-profile-btn" type="button">حفظ الملف الشخصي</button>
        <p class="success-msg" id="profile-success" aria-live="polite"></p>
        <p class="error-msg" id="upload-status" aria-live="polite"></p>
      </section>

      <!-- Add Link Section -->
      <section class="card-section" aria-labelledby="add-link-title">
        <h2 id="add-link-title">إضافة رابط جديد</h2>
        <p class="section-desc">كل رابط يمكن أن يملك لون نيون خاص وحالة ظهور.</p>

        <div class="form-grid">
          <div class="field-group">
            <label for="link-title">العنوان</label>
            <input type="text" id="link-title" placeholder="مثال: يوتيوب" />
          </div>

          <div class="field-group">
            <label for="link-url">الرابط</label>
            <input type="url" id="link-url" placeholder="https://..." />
          </div>

          <div class="field-group">
            <label for="link-icon">الأيقونة</label>
            <input type="text" id="link-icon" maxlength="4" value="🔗" />
          </div>

          <div class="field-group">
            <label for="link-neon">لون النيون</label>
            <input type="color" id="link-neon" value="#3b82f6" />
          </div>

          <label class="checkbox-field full" for="link-visible">
            <span>الرابط ظاهر في الصفحة العامة</span>
            <input type="checkbox" id="link-visible" checked />
          </label>
        </div>

        <button class="btn btn-primary" id="add-link-btn" type="button">إضافة الرابط</button>
        <p class="error-msg" id="link-error" aria-live="polite"></p>
      </section>

      <!-- Links List Section -->
      <section class="card-section" aria-labelledby="links-title">
        <h2 id="links-title">الروابط الحالية</h2>
        <p class="section-desc">تعديل، حذف، تفعيل/تعطيل.</p>

        <ul class="admin-links-list" id="admin-links-list" aria-live="polite"></ul>
      </section>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal-card glass-card">
      <h2>تعديل الرابط</h2>
      <p class="section-desc">حدث البيانات ولون النيون والظهور.</p>

      <input type="hidden" id="edit-id" />

      <div class="form-grid">
        <div class="field-group">
          <label for="edit-title">العنوان</label>
          <input type="text" id="edit-title" />
        </div>

        <div class="field-group">
          <label for="edit-url">الرابط</label>
          <input type="url" id="edit-url" />
        </div>

        <div class="field-group">
          <label for="edit-icon">الأيقونة</label>
          <input type="text" id="edit-icon" maxlength="4" />
        </div>

        <div class="field-group">
          <label for="edit-neon">لون النيون</label>
          <input type="color" id="edit-neon" value="#3b82f6" />
        </div>

        <label class="checkbox-field full" for="edit-visible">
          <span>الرابط ظاهر</span>
          <input type="checkbox" id="edit-visible" />
        </label>
      </div>

      <p class="error-msg" id="edit-error" aria-live="polite"></p>

      <div class="modal-actions">
        <button class="btn btn-primary" id="save-edit-btn" type="button">حفظ</button>
        <button class="btn btn-ghost" id="cancel-edit-btn" type="button">إلغاء</button>
      </div>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
