<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#02040a" />
  <title>لوحة التحكم — Remlex</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"
    rel="stylesheet"
  />
</head>
<body class="admin-page">

  <!-- ═══ Auth Screen ═══ -->
  <div class="auth-screen" id="auth-screen">
    <section class="glass-card auth-card" aria-labelledby="auth-title">
      <div class="auth-brand">
        <span class="brand-mark">R</span>
        <div>
          <strong>Remlex</strong>
          <small>Admin Console</small>
        </div>
      </div>

      <h1 id="auth-title" class="auth-title">تسجيل الدخول</h1>
      <p class="auth-sub">حساب Firebase Auth فقط</p>

      <div class="field-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" />
      </div>

      <div class="field-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <p class="error-msg" id="auth-error" aria-live="polite"></p>

      <button class="btn btn-primary full-width" id="login-btn" type="button">دخول</button>
    </section>
  </div>

  <!-- ═══ Dashboard ═══ -->
  <main class="dashboard" id="dashboard" hidden>
    <header class="dash-header">
      <div class="dash-title">
        <span class="dash-logo">Remlex</span>
        <span class="dash-label">Admin Panel</span>
      </div>
      <button class="btn btn-ghost" id="logout-btn" type="button">خروج</button>
    </header>

    <div class="dash-body">

      <!-- Profile -->
      <section class="glass-card section-card" aria-labelledby="profile-section-title">
        <div class="section-heading">
          <div>
            <h2 id="profile-section-title">الملف الشخصي</h2>
            <p>الاسم، النبذة، الصورة، وألوان الصفحة العامة.</p>
          </div>
        </div>

        <div class="avatar-editor">
          <img id="avatar-preview" class="avatar-preview" alt="معاينة" hidden />
          <div class="field-group">
            <label for="p-avatar-file">رفع صورة</label>
            <input type="file" id="p-avatar-file" accept="image/*" />
          </div>
        </div>

        <div class="form-grid">
          <div class="field-group">
            <label for="p-name">الاسم</label>
            <input type="text" id="p-name" placeholder="Remlex" />
          </div>

          <div class="field-group full">
            <label for="p-bio">Bio</label>
            <textarea id="p-bio" rows="2" placeholder="نبذة قصيرة…"></textarea>
          </div>

          <div class="field-group">
            <label for="p-accent">لون الهوية</label>
            <input type="color" id="p-accent" value="#3b82f6" />
          </div>

          <div class="field-group">
            <label for="p-bg-top">لون الخلفية علوي</label>
            <input type="color" id="p-bg-top" value="#081120" />
          </div>

          <div class="field-group">
            <label for="p-bg-bottom">لون الخلفية سفلي</label>
            <input type="color" id="p-bg-bottom" value="#02040a" />
          </div>

          <div class="field-group full">
            <label for="p-avatar">رابط صورة خارجي (اختياري)</label>
            <input type="url" id="p-avatar" placeholder="https://…" />
          </div>
        </div>

        <button class="btn btn-primary full-width" id="save-profile-btn" type="button">
          حفظ الملف الشخصي
        </button>

        <p class="success-msg" id="profile-success" aria-live="polite"></p>
        <p class="error-msg" id="upload-status" aria-live="polite"></p>
      </section>

      <!-- Add Link -->
      <section class="glass-card section-card" aria-labelledby="add-link-title">
        <div class="section-heading">
          <div>
            <h2 id="add-link-title">إضافة رابط</h2>
            <p>لون نيون خاص بكل رابط وتحكم بالظهور.</p>
          </div>
        </div>

        <div class="form-grid">
          <div class="field-group">
            <label for="link-title">العنوان</label>
            <input type="text" id="link-title" placeholder="مثال: يوتيوب" />
          </div>

          <div class="field-group">
            <label for="link-url">الرابط</label>
            <input type="url" id="link-url" placeholder="https://…" />
          </div>

          <div class="field-group">
            <label for="link-icon">أيقونة</label>
            <input type="text" id="link-icon" maxlength="4" value="🔗" />
          </div>

          <div class="field-group">
            <label for="link-neon">لون النيون</label>
            <input type="color" id="link-neon" value="#3b82f6" />
          </div>

          <label class="checkbox-field full" for="link-visible">
            <span>ظاهر في الصفحة العامة</span>
            <input type="checkbox" id="link-visible" checked />
          </label>
        </div>

        <button class="btn btn-primary full-width" id="add-link-btn" type="button">إضافة الرابط</button>
        <p class="error-msg" id="link-error" aria-live="polite"></p>
      </section>

      <!-- Links List -->
      <section class="glass-card section-card" aria-labelledby="links-section-title">
        <div class="section-heading">
          <div>
            <h2 id="links-section-title">الروابط الحالية</h2>
            <p>تعديل، حذف، تفعيل/تعطيل.</p>
          </div>
          <button class="btn btn-ghost" id="refresh-links-btn" type="button">تحديث</button>
        </div>

        <ul class="admin-links-list" id="admin-links-list" aria-live="polite"></ul>
      </section>

    </div>
  </main>

  <!-- ═══ Edit Modal ═══ -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    hidden
    role="dialog"
    aria-modal="true"
    aria-labelledby="edit-title-label"
  >
    <section class="glass-card modal-card">
      <div class="section-heading">
        <div>
          <h2 id="edit-title-label">تعديل الرابط</h2>
          <p>حدّث البيانات ولون النيون والظهور.</p>
        </div>
      </div>

      <input type="hidden" id="edit-id" />

      <div class="form-grid">
        <div class="field-group">
          <label for="edit-title">العنوان</label>
          <input type="text" id="edit-title" />
        </div>

        <div class="field-group">
          <label for="edit-url">الرابط</label>
          <input type="url" id="edit-url" />
        </div>

        <div class="field-group">
          <label for="edit-icon">الأيقونة</label>
          <input type="text" id="edit-icon" maxlength="4" />
        </div>

        <div class="field-group">
          <label for="edit-neon">لون النيون</label>
          <input type="color" id="edit-neon" value="#3b82f6" />
        </div>

        <label class="checkbox-field full" for="edit-visible">
          <span>الرابط ظاهر</span>
          <input type="checkbox" id="edit-visible" />
        </label>
      </div>

      <p class="error-msg" id="edit-error" aria-live="polite"></p>

      <div class="modal-actions">
        <button class="btn btn-primary" id="save-edit-btn" type="button">حفظ</button>
        <button class="btn btn-ghost" id="cancel-edit-btn" type="button">إلغاء</button>
      </div>
    </section>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
